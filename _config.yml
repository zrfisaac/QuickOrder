theme: jekyll-theme-minimal
title: Octocat's homepage
description: Bookmark this to keep an eye on my project updates!

# Color Customization for Dark Theme
page-col: "#121212"  # Dark background for pages
text-col: "#E0E0E0"  # Light text for readability
link-col: "#BB86FC"  # Light purple links
hover-col: "#3700B3"  # Dark purple for hover effects

# Navbar Customization
navbar-col: "#1F1B24"  # Dark navbar background
navbar-text-col: "#E0E0E0"  # Light text on navbar
navbar-border-col: "#333333"  # Dark border for navbar

# Footer Customization
footer-col: "#1F1B24"  # Dark footer background
footer-text-col: "#E0E0E0"  # Light footer text
footer-link-col: "#BB86FC"  # Purple footer links
footer-hover-col: "#3700B3"  # Darker purple on hover

# Optional: Add other configurations if needed for your specific setup
dark-theme:
  active: true  # Activate dark theme toggle
  button-label: "Switch to Dark Mode"
  button-position: top-right
